services:
  firestore-emulator:
    image: google/cloud-sdk:emulators
    command: >
      bash -c "
        gcloud beta emulators firestore start --host-port=0.0.0.0:8086 --project=cgs-photos-test
      "
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8086/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  pubsub-emulator:
    image: google/cloud-sdk:emulators
    command: >
      bash -c "
        gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=cgs-photos-test
      "
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  fake-gcs-server:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-port", "4443", "-public-host", "fake-gcs-server:4443"]
    ports:
      - "4443:4443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4443/storage/v1/b || curl -sf http://localhost:4443/storage/v1/b || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  cgs-api:
    build:
      context: ../../server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GCP_PROJECT_ID=cgs-photos-test
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8086
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - STORAGE_EMULATOR_HOST=http://fake-gcs-server:4443
    depends_on:
      firestore-emulator:
        condition: service_healthy
      pubsub-emulator:
        condition: service_healthy
      fake-gcs-server:
        condition: service_healthy
  cgs-processing:
    build:
      context: ../../processing
      dockerfile: Dockerfile
    environment:
      - GCP_PROJECT_ID=cgs-photos-test
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8086
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - STORAGE_EMULATOR_HOST=http://fake-gcs-server:4443
    depends_on:
      firestore-emulator:
        condition: service_healthy
      pubsub-emulator:
        condition: service_healthy
      fake-gcs-server:
        condition: service_healthy
