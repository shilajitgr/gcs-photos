name: cgs_photos
description: CGS Photos — Bring Your Own Storage photo manager.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Local database (Drift / SQLite with SQLCipher encryption)
  drift: ^2.18.0
  sqlcipher_flutter_libs: ^0.5.6
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure storage for DB passphrase (Keychain / Keystore)
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1

  # Networking
  dio: ^5.4.3+1
  cached_network_image: ^3.3.1

  # UI helpers
  flutter_blurhash: ^0.8.2

  # Crypto (SHA-256)
  crypto: ^3.0.3

  # Device photo access
  photo_manager: ^3.2.0

  # Permissions
  permission_handler: ^11.3.1

  # Background work
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Drift code generation
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

  # Testing
  mocktail: ^1.0.3

  # Lints
  flutter_lints: ^3.0.2
