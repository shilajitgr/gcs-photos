name: Processing CI

on:
  push:
    paths:
      - "processing/**"
    branches:
      - main
  pull_request:
    paths:
      - "processing/**"

env:
  NODE_VERSION: "20"
  REGISTRY: us-docker.pkg.dev
  IMAGE: cgs-processing

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: processing/package-lock.json

      - name: Install dependencies
        working-directory: processing
        run: npm ci

      - name: Run lint
        working-directory: processing
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: processing/package-lock.json

      - name: Install dependencies
        working-directory: processing
        run: npm ci

      - name: Run tests
        working-directory: processing
        run: npm test

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cgs-processing ./processing

  deploy:
    name: Push to Artifact Registry
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/cgs-photos/${{ env.IMAGE }}:${{ github.sha }}"
          docker build -t "${IMAGE_TAG}" ./processing
          docker push "${IMAGE_TAG}"
