name: Functions CI

on:
  push:
    paths:
      - "functions/**"
    branches:
      - main
  pull_request:
    paths:
      - "functions/**"

env:
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/eventrouter/package-lock.json

      - name: Install dependencies
        working-directory: functions/eventrouter
        run: npm ci

      - name: Run lint
        working-directory: functions/eventrouter
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/eventrouter/package-lock.json

      - name: Install dependencies
        working-directory: functions/eventrouter
        run: npm ci

      - name: Type check
        working-directory: functions/eventrouter
        run: npm run typecheck

  deploy:
    name: Deploy Cloud Function
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: functions/eventrouter/package-lock.json

      - name: Install dependencies
        working-directory: functions/eventrouter
        run: npm ci

      - name: Build
        working-directory: functions/eventrouter
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Functions
        working-directory: functions/eventrouter
        run: |
          gcloud functions deploy event-router \
            --gen2 \
            --runtime=nodejs20 \
            --region=${{ secrets.GCP_REGION }} \
            --trigger-event-filters="type=google.cloud.storage.object.v1.finalized" \
            --entry-point=eventRouter \
            --service-account=cgs-eventrouter-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},PUBSUB_TOPIC=photo-uploads" \
            --source=.
