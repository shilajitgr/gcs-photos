name: E2E Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  cross-service:
    name: Cross-Service E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        working-directory: test/e2e
        run: docker compose -f docker-compose.test.yml up -d --build --wait
        timeout-minutes: 10

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for API to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "API is ready."
              break
            fi
            echo "Attempt $i/30 - waiting 2s..."
            sleep 2
          done

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run API E2E tests
        working-directory: test/e2e/api
        env:
          API_BASE_URL: http://localhost:8080
        run: go test -v -timeout 5m ./...

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run pipeline E2E tests
        working-directory: test/e2e/pipeline
        env:
          PUBSUB_EMULATOR_HOST: localhost:8085
          FIRESTORE_EMULATOR_HOST: localhost:8086
          STORAGE_EMULATOR_HOST: http://localhost:4443
        run: |
          npm ci
          npm test

      - name: Tear down services
        if: always()
        working-directory: test/e2e
        run: docker compose -f docker-compose.test.yml down -v
