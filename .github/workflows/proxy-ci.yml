name: Proxy CI

on:
  push:
    paths:
      - "proxy/**"
      - ".github/workflows/proxy-ci.yml"
    branches:
      - main
  pull_request:
    paths:
      - "proxy/**"
      - ".github/workflows/proxy-ci.yml"
  workflow_dispatch:

env:
  GO_VERSION: "1.23"
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: cgs-image-proxy

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libvips-dev
        run: sudo apt-get update && sudo apt-get install -y libvips-dev pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: proxy/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: proxy
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libvips-dev
        run: sudo apt-get update && sudo apt-get install -y libvips-dev pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: proxy/go.sum

      - name: Run tests with race detector
        working-directory: proxy
        run: go test -race ./...

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cgs-image-proxy ./proxy

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.DEPLOY_ENABLED == 'true' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/cgs-photos/${{ env.IMAGE }}:${{ github.sha }}"
          docker build -t "${IMAGE_TAG}" ./proxy
          docker push "${IMAGE_TAG}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: cgs-image-proxy
          region: ${{ secrets.GCP_REGION }}
          image: ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/cgs-photos/${{ env.IMAGE }}:${{ github.sha }}
